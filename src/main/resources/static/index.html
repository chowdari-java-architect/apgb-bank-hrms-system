<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bank HRMS Dashboard</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }
        form {
            width: 400px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }
        button {
            padding: 10px 20px;
            cursor: pointer;
        }
        table {
            margin-top: 30px;
            width: 80%;
            border-collapse: collapse;
        }
        table, th, td {
            border: 1px solid #999;
            padding: 10px;
        }
    </style>
</head>
<body>
<div style="margin-bottom:20px;">
    <label>Select Login Role:</label>
    <select id="loginRole" onchange="applyRoleAccess()">
        <option value="EMPLOYEE">Employee</option>
        <option value="HR">HR Manager</option>
        <option value="IT_ADMIN">IT Admin</option>
    </select>
</div>
<h2>🏦 Bank HRMS Employee Dashboard</h2>

<form id="employeeForm">
    <label>Name:</label>
    <input type="text" id="name" required>

    <label>Email:</label>
    <input type="text" id="email" required>

    <label>Phone:</label>
    <input type="text" id="phone" required>

    <label>Role:</label>
    <input type="text" id="role" required>

    <label>Joining Date:</label>
    <input type="date" id="joiningDate" required>

    <button type="submit">Save Employee</button>
</form>

<h3>Employee List</h3>
<table id="employeeTable">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Email</th>
        <th>Role</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>
<h3>Transfer / Promotion Request</h3>

<form id="transferForm">
    <label>Employee Name:</label>
    <input type="text" id="employeeName" required>

    <label>Current Role:</label>
    <input type="text" id="currentRole" required>

    <label>Requested Role:</label>
    <input type="text" id="requestedRole" required>

    <label>Reason:</label>
    <input type="text" id="reason" required>

    <button type="submit">Submit Transfer Request</button>
</form>
<h3>HR Analytics Dashboard</h3>
<div id="analytics" style="display:flex; gap:20px; margin-bottom:20px;">
    <div><b>Total Employees:</b> <span id="totalEmployees">0</span></div>
    <div><b>Pending Requests:</b> <span id="pendingRequests">0</span></div>
    <div><b>Approved Requests:</b> <span id="approvedRequests">0</span></div>
</div>
<button onclick="window.location.href='/transfers/export'">
    Export Transfer Report
</button>
<h3>Transfer Requests</h3>
<table id="transferTable">
    <thead>
    <tr>
        <th>ID</th>
        <th>Employee</th>
        <th>Current Role</th>
        <th>Requested Role</th>
        <th>Status</th>
        <th>action</th>
    </tr>
    </thead>
    <tbody></tbody>
</table>
<script src="/hrms.js"></script>
</body>
</html>
